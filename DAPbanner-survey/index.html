<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clara Banner Survey</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F0F2F5; min-height: 100vh; padding: 40px 24px; }
.page-title { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 4px; }
.page-sub   { font-size: 13px; color: #6B7280; margin-bottom: 28px; line-height: 1.6; }

.options-row { display: flex; gap: 16px; margin-bottom: 28px; }
.option-col  { flex: 1; background: white; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.col-lbl { font-size: 10px; font-weight: 700; letter-spacing:.1em; text-transform:uppercase; color:#9CA3AF; margin-bottom:6px; }
.col-ttl { font-size: 14px; font-weight: 600; color:#111827; margin-bottom:14px; }

.pal-list { display: flex; flex-direction: column; gap: 8px; }
.pal-btn { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; border: 1.5px solid #E5E7EB; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: #374151; transition: all .15s; text-align: left; width: 100%; }
.pal-btn:hover { border-color: #9CA3AF; background: #FAFAFA; }
.pal-btn.sel { border-width: 2px; }
.pal-btn.p-neutral.sel { border-color:#3D4F6E; background:#EEF0F5; color:#3D4F6E; }
.pal-btn.p-advice.sel  { border-color:#6B5EB8; background:#EEEAF8; color:#4A3D8F; }
.pal-btn.p-mint.sel    { border-color:#2A7D5E; background:#E3F4EE; color:#1B5C44; }
.radio { width:16px; height:16px; border-radius:50%; border:1.5px solid #D1D5DB; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.pal-btn.sel .radio { border-color:currentColor; background:currentColor; }
.radio-dot { width:6px; height:6px; border-radius:50%; background:white; display:none; }
.pal-btn.sel .radio-dot { display:block; }
.swatches { display:flex; gap:3px; }
.sw { width:11px; height:11px; border-radius:50%; }

.comp-list { display: flex; flex-direction: column; gap: 8px; }
.comp-btn { border: 1.5px solid #E5E7EB; border-radius: 10px; background: white; cursor: pointer; overflow: hidden; text-align: left; transition: all .15s; display: flex; align-items: center; width: 100%; }
.comp-btn:hover { border-color: #9CA3AF; }
.comp-btn.sel { border: 2px solid #6B5EB8; background: #FAFAFF; }
.comp-thumb { width: 100px; height: 52px; object-fit: cover; object-position: right center; flex-shrink:0; filter: grayscale(100%); display:block; }
.comp-info  { padding: 0 14px; }
.comp-lbl   { font-size: 13px; font-weight: 600; color: #111827; }
.comp-sub   { font-size: 11px; color: #6B7280; margin-top: 2px; }

.preview-card { background: white; border-radius: 14px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.preview-lbl  { font-size: 10px; font-weight: 700; letter-spacing:.1em; text-transform:uppercase; color:#9CA3AF; margin-bottom:12px; }

.dashboard-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; border: 1px solid #E5E7EB; margin-bottom: 20px; line-height: 0; }
.dashboard-bg { width: 100%; display: block; }

/* Same coordinates that worked in the previous version */
.banner-overlay {
  position: absolute;
  left:   15.2%;
  top:    17.8%;
  width:  83.7%;
  height: 23.9%;
  overflow: hidden;
}
.banner-overlay img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }

.vote-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; color: white; cursor: pointer; transition: all .15s; }
.vote-btn:disabled { opacity:.4; cursor:not-allowed; background:#9CA3AF !important; }
.vote-btn:not(:disabled):hover { filter: brightness(1.08); }
.result { display:none; margin-top:14px; padding:16px; border-radius:10px; background:#F9FAFB; border:1px solid #E5E7EB; font-size:13px; color:#6B7280; text-align:center; line-height:1.6; }
.result strong { color:#111827; font-weight:600; }
.hint { font-size:11px; color:#9CA3AF; text-align:center; margin-top:12px; }
@media (max-width:560px) { .options-row { flex-direction: column; } }
</style>
</head>
<body>

<p class="page-title">Daily autopay banner campaign</p>
<p class="page-sub">Configure how you want the banner to look. Your combination is your vote.</p>

        Clara Neutral

        Clara Advice

function selectPalette(key, el) {
  document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel'); selP = key; updatePreview(); updateBtn();
}
function selectComp(key, el) {
  document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel'); selC = key; updatePreview(); updateBtn();
}
function updatePreview() {
  if (!selP || !selC) return;
  const img = document.getElementById('banner-img');
  img.src = FULL['c' + selC + '_' + selP];
  img.style.display = 'block';
}
function updateBtn() {
  const btn = document.getElementById('vote-btn');
  if (selP && selC) {
    btn.disabled = false;
    btn.style.background = PAL[selP].cta;
    btn.textContent = 'Vote · ' + PAL[selP].label + ' + Composition ' + COMP_LABEL[selC];
  } else {
    btn.disabled = true;
    btn.style.background = '#9CA3AF';
    btn.textContent = 'Select both options to vote';
  }
}
function submitVote() {
  const btn = document.getElementById('vote-btn');
  const res = document.getElementById('result');
  const feedback = document.getElementById('feedback').value;
  btn.disabled = true;
  btn.textContent = 'Sending...';
  fetch('https://n8n-ui-prod.clara.tools/webhook/76d76ead-5493-4fe5-a6d2-46bf05d420b7', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      combination: PAL[selP].label + ' + Composition ' + COMP_LABEL[selC],
      palette: PAL[selP].label,
      composition: 'Composition ' + COMP_LABEL[selC],
      feedback: feedback
    })
  })
  .then(() => {
    btn.textContent = '✓ Vote recorded';
    res.style.display = 'block';
    res.innerHTML = 'You voted for <strong>' + PAL[selP].label + '</strong> + <strong>Composition ' + COMP_LABEL[selC] + '</strong>. Thanks!';
    document.querySelectorAll('.pal-btn, .comp-btn').forEach(b => { b.disabled = true; b.style.cursor = 'default'; });
  })
  .catch(() => {
    btn.disabled = false;
    btn.textContent = 'Vote · ' + PAL[selP].label + ' + Composition ' + COMP_LABEL[selC];
    res.style.display = 'block';
    res.innerHTML = 'Something went wrong. Please try again.';
  });
}
</script>
</body>
